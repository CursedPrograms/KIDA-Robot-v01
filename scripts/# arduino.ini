# arduino.py — serial comms with dev00 (sensors/motors) and dev01 (lights/IR)

import serial
import time
import threading
import config
import state

# ─────────────────────────────────────────────
# Key mapping: Arduino token → state attribute
# ─────────────────────────────────────────────
KEY_MAP = {
    "MOTION":      "motionValue",
    "PHOTO":       "photoValue",
    "UV":          "uvValue",
    "METAL":       "metalValue",
    "BALL":        "ballSwitchValue",
    "LFL":         "lfLeftValue",
    "LFM":         "lfMidValue",
    "LFR":         "lfRightValue",
    "LASER":       "laserValue",
    "ULTRASONIC0": "ultrasonic0Value",
    "ULTRASONIC1": "ultrasonic1Value",
    "SERVO":       "servoPosValue",
    "BUTTON":      "buttonValue",
    "SPEED":       "motorSpeedValue",
    "STATUS":      "systemStatus",
}

# ─────────────────────────────────────────────
# IR handler — writes to state only
# mode_manager.set_mode_by_number() is called
# by the IR bridge in ui.py (avoids circular import)
# ─────────────────────────────────────────────
def handle_ir(line: str) -> None:
    # Mode-select signals from dev01
    _IR_MODE = {
        "IR1": ("IR_REMOTE",  "🎮 IR Remote mode"),
        "IR2": ("KEYBOARD",   "⌨️  Keyboard mode"),
        "IR3": ("AUTO",       "🤖 Autonomous mode"),
        "IR4": ("IDLE",       "🛑 Idle / blackout"),
    }
    if line in _IR_MODE:
        mode_str, label = _IR_MODE[line]
        state.irMode = mode_str
        print(label)
        return

    _IR_CMD = {
        "IRforward":     "FORWARD",
        "IRdown":        "BACKWARD",
        "IRleft":        "LEFT",
        "IRright":       "RIGHT",
        "IRplay":        "PLAY",
        "IRstop":        "STOP",
        "IRfastforward": "SPEED_UP",
        "IRskipforward": "NEXT_MODE",
    }
    if line in _IR_CMD:
        state.irCommand = _IR_CMD[line]
        return

    print(f"⚠️ Unknown IR: {line}")

# ─────────────────────────────────────────────
# Line-follower parser
# ─────────────────────────────────────────────
def parse_lf(line: str) -> None:
    try:
        inside = line.split("[", 1)[1].split("]", 1)[0]
        vals = {}
        for part in inside.strip().split():
            if ":" not in part:
                continue
            k, v = part.split(":", 1)
            vals[k.strip().upper()] = v.strip()
        state.lfLeftValue  = vals.get("L", state.lfLeftValue)
        state.lfMidValue   = vals.get("M", state.lfMidValue)
        state.lfRightValue = vals.get("R", state.lfRightValue)
    except Exception as e:
        print(f"⚠️ LF parse error: {e} | {line}")

# ─────────────────────────────────────────────
# Generic sensor-line parser
# e.g. "PHOTO:512 | UV:23 | LASER:1898 ULTRASONIC0:9 ULTRASONIC1:10"
# ─────────────────────────────────────────────
def parse_sensor_line(line: str, dev_name: str = "dev00") -> None:
    try:
        for chunk in line.replace(",", " ").replace("|", " ").split():
            if ":" not in chunk:
                continue
            key, val = chunk.split(":", 1)
            key = key.strip().upper()
            if key in KEY_MAP:
                setattr(state, KEY_MAP[key], val.strip())
    except Exception as e:
        print(f"⚠️ {dev_name} sensor parse error: {e} | {line}")

# ─────────────────────────────────────────────
# Dispatch one line from a device
# ─────────────────────────────────────────────
def dispatch(line: str, dev_name: str) -> None:
    line = line.strip()
    if not line:
        return
    if line in ("DEV0_READY", "DEV1_READY"):
        print(f"✅ {dev_name} ready")
        return
    if line.startswith("IR"):
        handle_ir(line)
        return
    u = line.upper()
    if "MOTION DETECTED" in u:
        state.systemStatus = "⚠ Motion"
        return
    if "METAL DETECTED" in u:
        state.systemStatus = "⚡ Metal"
        return
    if "BALL SWITCH" in u:
        state.systemStatus = "🏀 Ball"
        return
    if "LF[" in line:
        parse_lf(line)
        return
    if ":" in line:
        parse_sensor_line(line, dev_name)
        return
    print(f"⚠️ {dev_name} unknown: {line}")

# ─────────────────────────────────────────────
# Serial connection manager
# ─────────────────────────────────────────────
PORTS = {
    "dev00": "/dev/ttyUSB0",
    "dev01": "/dev/ttyUSB1",
}

arduinos: dict  = {}
_threads: dict  = {}

def connect(dev: str, port: str):
    try:
        ser = serial.Serial(port, config.ARDUINO_BAUD, timeout=1)
        time.sleep(2)
        arduinos[dev] = ser
        print(f"✅ Connected {dev} on {port}")
        return ser
    except Exception as e:
        print(f"❌ {dev} connection failed: {e}")
        return None

def _read_loop(dev: str, port: str) -> None:
    while True:
        ser = arduinos.get(dev)
        if not ser or not ser.is_open:
            print(f"🔌 Reconnecting {dev}…")
            ser = connect(dev, port)
            if not ser:
                time.sleep(2)
                continue
        try:
            raw = ser.readline()
            if not raw:
                continue
            line = raw.decode("utf-8", "ignore").strip()
            if line:
                dispatch(line, dev)
        except serial.SerialException:
            try:
                ser.close()
            except Exception:
                pass
            arduinos.pop(dev, None)
            time.sleep(1)
        except Exception as e:
            print(f"⚠️ {dev} error: {e}")
            time.sleep(0.2)

def start_arduino_threads() -> None:
    for dev, port in PORTS.items():
        t = _threads.get(dev)
        if t and t.is_alive():
            continue
        connect(dev, port)
        t = threading.Thread(target=_read_loop, args=(dev, port), daemon=True)
        t.start()
        _threads[dev] = t
        print(f"🔄 Thread started for {dev}")

def send_command(dev: str, cmd: str) -> None:
    ser = arduinos.get(dev)
    if not ser or not ser.is_open:
        print(f"❌ {dev} not connected — command dropped: {cmd}")
        return
    try:
        ser.write((cmd + "\n").encode())
        print(f"➡ {dev} ← {cmd}")
    except Exception as e:
        print(f"⚠️ Send failed {dev}: {e}")

def close_all() -> None:
    for dev, ser in arduinos.items():
        try:
            ser.close()
            print(f"🔒 Closed {dev}")
        except Exception as e:
            print(f"⚠️ Close error {dev}: {e}")
